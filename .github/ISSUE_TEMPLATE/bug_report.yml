name: Bug Report
description: File a bug report.
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: mc_version
    attributes:
      label: Minecraft version
      description: Keep in mind, in most scenarios we do not update old Minecraft versions. If the latest version of the mod is on 1.21.1, we do not plan on updating 1.20.1.
      placeholder: | 
        Example: 1.20.1
    validations:
      required: true
  - type: input
    id: mod_version
    attributes:
      label: Mod version
      placeholder: | 
        Example: 6.1.0
    validations:
      required: true
  - type: input
    id: forge_version
    attributes:
      label: NeoForge version
      placeholder: | 
        Example: 21.1.160
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please explain in detail what the issue is. Feel free to attach screenshots or videos, if it helps!
      placeholder: | 
        Example:
        When right-clicking a certain block, the game crashes.
    validations:
      required: true
  - type: textarea
    id: reproduction_steps
    attributes:
      label: Steps to reproduce
      description: Which steps did you take to cause the issue? Please describe below how to replicate it.
      placeholder: |
        Example:
        1. Place block;
        2. Attempt to right-click the block.
  - type: textarea
    id: mod_list
    attributes:
      label: Mod list
      description: |
        Please provide the list of mods you're using.
        You can generate a mod list by forcing a crash. In your game, hold F3+C for 10 seconds, then check your logs; the list of mods will be at the end.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: | 
        Please provide the client or server logs from your launcher. They contain vital information to troubleshoot the issue.
        To upload logs, you can use websites such as: https://pastebin.com/ https://paste.ee/ https://mclo.gs/
  - type: checkboxes
    id: confirm_minimal
    attributes:
      label: Confirmation
      options:
        - label: I have tested this on a minimal instance
    validations:
      required: true
  - type: checkboxes
    id: confirm_duplicate
    attributes:
      label: Confirmation
      options:
        - label: I have verified that this is not a duplicate of an existing (open or closed) issue
    validations:
      required: true
  - type: checkboxes
    id: confirm_mods
    attributes:
      label: Confirmation
      options:
        - label: I have verified this issue is present without rendering & shader mods like Optifine, Iris, Oculus, etc.
    validations:
      required: true
